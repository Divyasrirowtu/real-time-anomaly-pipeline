version: '3.8'

services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  postgres:
    image: postgres:15
    container_name: anomaly_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: anomalies_db
    ports:
      - "5432:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  producer:
    build: ./producer
    container_name: kafka_producer
    depends_on:
      - kafka
    environment:
      KAFKA_BROKER: kafka:9092
      TOPIC_NAME: raw_events

  consumer:
    build: ./consumer
    container_name: anomaly_consumer
    depends_on:
      - kafka
    environment:
      KAFKA_BROKER: kafka:9092
      INPUT_TOPIC: raw_events
      OUTPUT_TOPIC: anomalies

  db_sink:
    build: ./db_sink
    container_name: postgres_sink
    depends_on:
      - kafka
      - postgres
    environment:
      KAFKA_BROKER: kafka:9092
      TOPIC_NAME: anomalies
      POSTGRES_HOST: postgres
      POSTGRES_DB: anomalies_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin

  dashboard:
    build: ./dashboard
    container_name: anomaly_dashboard
    depends_on:
      - postgres
    ports:
      - "8501:8501"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: anomalies_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin